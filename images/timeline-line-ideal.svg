           C100 526, 168 548, 190 596
           C210 640, 182 688, 136 726
           C90 764, 74 803, 96 846
           C116 885, 174 910, 186 956
           C198 1004, 164 1045, 132 1082
           C112 1106, 108 1132, 116 1162
           C118 1171, 120 1177, 122 1183"
