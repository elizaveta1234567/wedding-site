<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <section class="rsvp">
    <h2>RSVP</h2>
    <p>Подтвердите присутствие — так мы всё красиво спланируем ✨</p>

    <!-- ✅ ЕДИНСТВЕННАЯ РАБОЧАЯ NETLIFY-ФОРМА -->
    <form
      name="rsvp"
      method="POST"
      action="/success.html"
      data-netlify="true"
      netlify-honeypot="bot-field"
    >
      <!-- ОБЯЗАТЕЛЬНО -->
      <input type="hidden" name="form-name" value="rsvp" />

      <!-- honeypot -->
      <p style="display:none">
        <label>Don’t fill this out <input name="bot-field" /></label>
      </p>

      <label>
        Имя и фамилия
        <input
          type="text"
          name="name"
          placeholder="Например: Елизавета Иванова"
          required
        />
      </label>

      <label>
        Будете?
        <select name="attendance" required>
          <option value="">Выберите…</option>
          <option value="Да, приду">Да, приду</option>
          <option value="Не смогу">Не смогу</option>
        </select>
      </label>

      <label>
        Комментарий (аллергии / предпочтения)
        <textarea
          name="comment"
          placeholder="Например: не ем рыбу"
        ></textarea>
      </label>

      <button type="submit">Отправить</button>

      <p class="hint">
        После отправки вас перенаправит на страницу «Готово»
      </p>
    </form>
  </section>

</body>
</html>
