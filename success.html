<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Спасибо!</title>

  <link rel="stylesheet" href="fonts/fonts.css" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="successWrap">
    <div class="card successCard">
      <h1 class="title">Спасибо!</h1>
      <p class="text muted">Ваш ответ отправлен. До встречи на празднике 🤍</p>

      <a id="success-back-to-site" class="btn btn--primary btn--wide" href="index.html#rsvp">
        Вернуться на сайт
      </a>
      <script>
        (function () {
          var a = document.getElementById("success-back-to-site");
          if (!a) return;
          try {
            if ("scrollRestoration" in history) history.scrollRestoration = "manual";
          } catch (e) {}
          try {
            /* Рядом с success.html лежит index.html — явный файл + якорь (надёжнее, чем только /#rsvp) */
            var dir = new URL(".", location.href);
            var target = new URL("index.html", dir.href);
            target.searchParams.set("to", "rsvp");
            target.hash = "#rsvp";
            a.href = target.href;
          } catch (e) {
            a.href = "index.html?to=rsvp#rsvp";
          }
        })();
      </script>
    </div>
  </main>
</body>
</html>
