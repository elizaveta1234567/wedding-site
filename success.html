<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Спасибо!</title>

  <link rel="stylesheet" href="fonts/fonts.css" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="successWrap">
    <div class="card successCard">
      <h1 class="title">Спасибо!</h1>
      <p class="text muted">Ваш ответ отправлен. До встречи на празднике 🤍</p>

      <a id="success-back-to-site" class="btn btn--primary btn--wide" href="index.html?to=rsvp#rsvp">
        Вернуться на сайт
      </a>
      <script>
        (function () {
          var a = document.getElementById("success-back-to-site");
          if (!a) return;
          try {
            var path = location.pathname || "";
            var i = path.lastIndexOf("/");
            var dir = i >= 0 ? path.slice(0, i + 1) : "/";
            a.href = location.origin + dir + "index.html?to=rsvp#rsvp";
          } catch (e) {}
        })();
      </script>
    </div>
  </main>
</body>
</html>
