<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Спасибо!</title>

  <link rel="stylesheet" href="fonts/fonts.css" />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="successWrap">
    <div class="card successCard">
      <h1 class="title">Спасибо!</h1>
      <p class="text muted">Ваш ответ отправлен. До встречи на празднике 🤍</p>

      <a id="success-back-to-site" class="btn btn--primary btn--wide" href="/#rsvp">
        Вернуться на сайт
      </a>
      <script>
        (function () {
          var a = document.getElementById("success-back-to-site");
          if (!a) return;
          try {
            if ("scrollRestoration" in history) history.scrollRestoration = "manual";
          } catch (e) {}
          try {
            /* Каталог, где лежит success.html → главная той же папки (без index.html — иначе редирект может срезать #) */
            var base = new URL(".", location.href);
            base.searchParams.set("to", "rsvp");
            base.hash = "#rsvp";
            a.href = base.href;
          } catch (e) {
            try {
              a.href = location.origin + "/?to=rsvp#rsvp";
            } catch (e2) {
              a.href = "/#rsvp";
            }
          }
        })();
      </script>
    </div>
  </main>
</body>
</html>
